services:
  - type: web
    name: lumi-books
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: lumi-books-data
      mountPath: /var/data
      sizeGB: 1
